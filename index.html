<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Sinais Bac Bo</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    h1 {
      margin-bottom: 20px;
    }
    #signal {
      font-size: 40px;
      margin: 20px 0;
      font-weight: bold;
    }
    .player { color: #00bfff; }
    .banker { color: #ff4d4d; }

    button {
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    #history {
      margin-top: 30px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .item {
      padding: 5px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

<h1>Gerador de Sinais</h1>

<div id="signal">---</div>

<button onclick="gerarSinal()">Gerar Sinal</button>

<div id="history"></div>

<script>
let historico = [];

function gerarSinal() {
  let resultado = Math.random() < 0.5 ? "Jogador" : "Banco";

  let signalEl = document.getElementById("signal");
  signalEl.innerText = resultado;
  signalEl.className = resultado === "Jogador" ? "player" : "banker";

  historico.unshift(resultado);
  atualizarHistorico();
}

function atualizarHistorico() {
  let historyEl = document.getElementById("history");
  historyEl.innerHTML = "<h3>Histórico</h3>";

  historico.slice(0, 10).forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = (index + 1) + " - " + item;
    historyEl.appendChild(div);
  });
}
</script>

</body>
</html>
