<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelsi Signals</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#050505,#111,#1a1a1a);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
    min-height:100vh;
    overflow-x:hidden;
}

.container{
    padding-top:40px;
}

.logo{
    font-size:42px;
    font-weight:bold;
    letter-spacing:2px;
    margin-bottom:25px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #00bfff;
    }
    to{
        text-shadow:0 0 25px #00bfff,
                    0 0 40px #00bfff;
    }
}

.card{
    width:320px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

#signal{
    font-size:48px;
    font-weight:bold;
    margin:20px 0;
    transition:0.4s;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.player{
    color:#00bfff;
    text-shadow:0 0 15px #00bfff;
}

.banker{
    color:#ff3b3b;
    text-shadow:0 0 15px #ff3b3b;
}

#timer{
    font-size:22px;
    margin-top:10px;
    color:#ccc;
}

.history-title{
    margin-top:25px;
    margin-bottom:10px;
    font-size:24px;
}

#history{
    max-height:250px;
    overflow:auto;
}

.item{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    animation:slide 0.4s ease;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        KELSI SIGNALS
    </div>

    <div class="card">

        <h2>Sinal Atual</h2>

        <div id="signal">
            ...
        </div>

        <div id="timer"></div>

        <div class="history-title">
            Histórico
        </div>

        <div id="history"></div>

    </div>

    <div class="footer">
        Sistema Automático
    </div>

</div>

<script>

let historico = [];

function gerarSinal(){

    let resultado = Math.random() < 0.5
        ? "Jogador"
        : "Banco";

    let signal = document.getElementById("signal");

    signal.innerText = resultado;

    signal.className = resultado === "Jogador"
        ? "player"
        : "banker";

    historico.unshift(resultado);

    atualizarHistorico();
}

function atualizarHistorico(){

    let history = document.getElementById("history");

    history.innerHTML = "";

    historico.slice(0,10).forEach((item,index)=>{

        history.innerHTML += `
            <div class="item">
                ${index + 1} • ${item}
            </div>
        `;
    });
}

let segundos = 15;

function atualizarTempo(){

    document.getElementById("timer")
    .innerText = "Próximo sinal em " + segundos + "s";

    segundos--;

    if(segundos < 0){

        gerarSinal();

        segundos = 15;
    }
}

gerarSinal();

setInterval(atualizarTempo,1000);

</script>

</body>
</html>
